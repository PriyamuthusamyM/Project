<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            margin:80px auto;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:black;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#333;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:10px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Admin Login</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <label>Username</label>
            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>
            

        </form>

    </div>


<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
</body>
</html>
