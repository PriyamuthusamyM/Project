<!DOCTYPE html>
<html>
<head>
    <title>Admin Signup</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1f3c88,#3b5ed7);
        }

        .container{
            width:420px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

        .title h2{
            color:#1f3c88;
            margin-bottom:8px;
        }

        .title p{
            color:gray;
            font-size:14px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:13px;
            border:1px solid #ddd;
            border-radius:10px;
            margin-bottom:16px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#3b5ed7;
            box-shadow:0 0 6px rgba(59,94,215,0.3);
        }

        button{
            width:100%;
            padding:13px;
            background:#1f3c88;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#162d66;
        }

        .alert{
            padding:12px;
            border-radius:8px;
            margin-bottom:15px;
            text-align:center;
            font-size:14px;
        }

        .alert-danger{
            background:#ffebee;
            color:#c62828;
        }

        .alert-success{
            background:#e8f5e9;
            color:#2e7d32;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="title">
        <h2>🏥 Admin Signup</h2>
        <p>Create Hospital Admin Account</p>
    </div>

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert
            {% if message.tags == 'error' %}
                alert-danger
            {% else %}
                alert-success
            {% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" onsubmit="return validateAdmin()">

        {% csrf_token %}

        <label>First Name</label>
        {{ form.first_name }}

    

        <label>Username</label>
        {{ form.username }}

        <label>Password</label>
        {{ form.password }}

        <label>Confirm Password</label>
        <input type="password"
               id="confirm_password"
               placeholder="Confirm Password"
               required>

        <button type="submit">
            Signup
        </button>

    </form>

</div>

<script>

function validateAdmin(){

    let password =
    document.querySelector('input[name="password"]').value;

    let confirmPassword =
    document.getElementById("confirm_password").value;

    if(password.length < 6){
        alert("Password must be at least 6 characters");
        return false;
    }

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return false;
    }

    return true;
}

</script>


<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
</body>
</html>
