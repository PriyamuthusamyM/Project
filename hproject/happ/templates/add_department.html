{% block content %}

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

/* CENTER WRAPPER */
.page-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

/* CARD */
.form-card{
    width:450px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.form-card:hover{
    transform:translateY(-5px);
}

/* TITLE */
.title{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
    color:#1e293b;
}

/* FORM INPUTS */
input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

/* BUTTON */
.btn-add{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn-add:hover{
    background:#1d4ed8;
}

/* LINK BUTTON */
.bottom-link{
    text-align:center;
    margin-top:15px;
}

.bottom-link a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

.bottom-link a:hover{
    text-decoration:underline;
}

</style>

<div class="page-wrapper">

    <div class="form-card">

        <div class="title">🏢 Add Department</div>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn-add">
                ➕ Add Department
            </button>

        </form>

        <div class="bottom-link">
            <a href="{% url 'department_list' %}">← View Departments</a>
        </div>

    </div>

</div>

{% endblock %}
<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
