<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="utf-8">

  <title>{% block title %}Hospital Management System{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <style>
    body {
      padding-top: 70px; /* avoid navbar overlap */
      background-color: #f5f7fa;
      font-family: "Segoe UI", sans-serif;
    }
  </style>

</head>

<body>

  <!-- NAVBAR -->
  {% include "navbar.html" %}

  <!-- MAIN CONTENT -->
  <div class="container">
    {% block content %}
    {% endblock content %}
  </div>

  <!-- FOOTER -->
  {% comment %} {% include "footer.html" %} {% endcomment %}

  <!-- JS FILES -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>


<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
</body>

</html>
