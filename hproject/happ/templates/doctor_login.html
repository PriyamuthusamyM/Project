<!DOCTYPE html>
<html>
<head>
    <title>Doctor Login</title>

    <style>
        body{
            margin:0;
            font-family:"Segoe UI", sans-serif;
            background: linear-gradient(135deg, #b6bde7, #e0e7ff);
        }

        /* NAVBAR */
        .navbar{
            background:#1e293b;
            color:white;
            padding:15px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        /* CENTER BOX */
        .box{
            width:350px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .box h2{
            text-align:center;
            color:#1e293b;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:10px;
        }

        .footer-text{
            text-align:center;
            margin-top:10px;
            font-size:14px;
        }

        .footer-text a{
            color:#2563eb;
            text-decoration:none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    🏥 Hospital Management System - Doctor Login
</div>

<!-- LOGIN BOX -->
<div class="box">

    <h2>Doctor Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer-text">
        Don't have account? <a href="{% url 'doctor_signup' %}">Signup here</a>
    </div>

</div>


<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
</body>
</html>
