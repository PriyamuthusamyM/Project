{% block content %}

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

/* TITLE */
.page-title{
    text-align:center;
    margin:25px 0;
    font-size:28px;
    font-weight:bold;
    color:#1e293b;
}

/* CARD */
.form-card{
    max-width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* LABEL */
label{
    font-weight:600;
    margin-bottom:6px;
    color:#1e293b;
}

/* INPUT */
input, select, textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-top:5px;
}

input:focus, select:focus, textarea:focus{
    border-color:#2563eb;
    outline:none;
}

/* BUTTON */
.btn-primary{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    margin-top:15px;
    transition:0.3s;
}

.btn-primary:hover{
    background:#1d4ed8;
}

/* SMALL CARD STYLE FOR FORM AS P */
form p{
    margin-bottom:15px;
}

</style>

<div class="container py-4">

    <h2 class="page-title">📅 Book Appointment</h2>

    <div class="form-card">

        <form method="POST">
            {% csrf_token %}

            <!-- Django form -->
            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <!-- Date field -->
            <div class="mb-3">
                <label>Appointment Date</label>
                <input type="date" name="appointment_date" class="form-control" id="dateField" required>
            </div>

            <button type="submit" class="btn-primary">
                📅 Book Appointment
            </button>

        </form>

    </div>

</div>

<!-- DATE VALIDATION -->
<script>
window.onload = function () {
    let today = new Date().toISOString().split('T')[0];
    document.getElementById("dateField").setAttribute("min", today);
};
</script>

{% endblock %}
<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
