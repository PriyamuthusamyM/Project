<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us | Hospital</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

  <style>

    body {
      background: #f4f6f9;
      font-family: Arial;
    }

    .contact-box {
      width: 50%;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .title {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .star-rating {
      direction: rtl;
      font-size: 25px;
      unicode-bidi: bidi-override;
      text-align: center;
      margin-bottom: 15px;
    }

    .star-rating input {
      display: none;
    }

    .star-rating label {
      color: #ccc;
      cursor: pointer;
    }

    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: gold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 18px;
      border-radius: 8px;
    }

  </style>
</head>

<body>

{% include "navbar.html" %}

<div class="contact-box">

  <div class="title">📩 Feedback</div>

  <form method="POST">
    {% csrf_token %}

    <!-- NAME -->
    <p><input type="text" name="name" placeholder="Your Name"></p>

    <!-- EMAIL -->
    <p><input type="email" name="email" placeholder="Your Email"></a>

    <!-- MESSAGE -->
    <p><textarea name="message" placeholder="Your Feedback"></textarea></p>

    <!-- ⭐ STAR RATING -->
    <div class="star-rating">
      <input type="radio" id="5star" name="rating" value="5"><label for="5star">★</label>
      <input type="radio" id="4star" name="rating" value="4"><label for="4star">★</label>
      <input type="radio" id="3star" name="rating" value="3"><label for="3star">★</label>
      <input type="radio" id="2star" name="rating" value="2"><label for="2star">★</label>
      <input type="radio" id="1star" name="rating" value="1"><label for="1star">★</label>
    </div>

    <button type="submit">Send Feedback</button>

  </form>
  <div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>


</div>

</body>
</html>
