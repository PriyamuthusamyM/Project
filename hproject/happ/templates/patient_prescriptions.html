{% block content %}

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

/* TITLE */
.page-title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin:25px 0;
    color:#1e293b;
}

/* GRID */
.pres-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.pres-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.3s;
    border-left:5px solid #2563eb;
}

.pres-card:hover{
    transform:translateY(-5px);
}

/* DOCTOR */
.doctor{
    font-size:18px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:10px;
}

/* TEXT */
.text{
    margin:6px 0;
    color:#374151;
}

/* ICON HEADER */
.icon{
    text-align:center;
    font-size:30px;
    margin-bottom:5px;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:30px;
    background:#e0f2fe;
    border-radius:10px;
    margin:20px;
    color:#1e293b;
}

/* BADGE STYLE DATE */
.date{
    display:inline-block;
    margin-top:8px;
    padding:5px 10px;
    background:#f1f5f9;
    border-radius:6px;
    font-size:13px;
    color:#111827;
}

</style>

<div class="container">

    <div class="icon">💊</div>
    <div class="page-title">My Prescriptions</div>

    {% if prescriptions %}

    <div class="pres-grid">

        {% for p in prescriptions %}

        <div class="pres-card">

            <div class="doctor">👨‍⚕️ Doctor: {{ p.doctor.name }}</div>

            <div class="text">
                <strong>💊 Medicines:</strong><br>
                {{ p.medicine_details }}
            </div>

            <div class="text">
                <strong>📝 Notes:</strong><br>
                {{ p.notes }}
            </div>

            <div class="date">
                📅 {{ p.prescription_date }}
            </div>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <div class="empty">
        No prescriptions found 💤
    </div>

    {% endif %}

</div>

{% endblock %}
<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
