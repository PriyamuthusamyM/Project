<!DOCTYPE html>
<html>
<head>
    <title>Customer Feedback</title>

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
            margin:0;
            padding:30px;
        }

        .container{
            width:90%;
            margin:auto;
        }

        h2{
            text-align:center;
            color:#1e293b;
            margin-bottom:30px;
            font-size:32px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }

        th{
            background:#1e293b;
            color:white;
            padding:15px;
            text-align:center;
            font-size:18px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f8fafc;
        }

        tr:hover{
            background:#e2e8f0;
            transition:0.3s;
        }

        .rating{
            color:gold;
            font-size:18px;
            font-weight:bold;
        }

        .no-data{
            text-align:center;
            color:gray;
            font-size:20px;
            margin-top:20px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>⭐ Customer Feedback</h2>

    {% if feedbacks %}

    <table>

        <tr>
            <th>Name</th>
            <th>Message</th>
            <th>Rating</th>
        </tr>

        {% for f in feedbacks %}
        <tr>
            <td>{{ f.name }}</td>
            <td>{{ f.message }}</td>
            <td class="rating">{{ f.rating }} ⭐</td>
        </tr>
        {% endfor %}

    </table>

    {% else %}
        <p class="no-data">No Feedback Available</p>
    {% endif %}

    <div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>


</div>

</body>
</html>
