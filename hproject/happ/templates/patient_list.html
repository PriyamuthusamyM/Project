{% block content %}

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

/* TITLE */
.page-title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin:25px 0;
    color:#1e293b;
}

/* CARD WRAPPER */
.table-card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
}

/* HEADER */
thead{
    background:#1e293b;
    color:white;
}

th, td{
    padding:12px;
    text-align:center;
}

/* ROW HOVER */
tbody tr:hover{
    background:#f1f5f9;
    transition:0.3s;
}

/* BUTTONS */
.btn{
    padding:6px 10px;
    border-radius:6px;
    font-size:13px;
    text-decoration:none;
    margin:2px;
    display:inline-block;
}

.edit{
    background:#facc15;
    color:#111;
}

.delete{
    background:#ef4444;
    color:white;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:20px;
    color:gray;
}

/* RESPONSIVE */
@media(max-width:768px){
    th, td{
        font-size:12px;
        padding:8px;
    }
}

</style>

<div class="container">

    <div class="page-title">🧑 Patients List</div>

    <div class="table-card">

        <div class="table-responsive">

            <table>

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>

                    {% for p in patients %}
                    <tr>
                        <td>{{ p.name }}</td>
                        <td>{{ p.phone }}</td>
                        <td>{{ p.email }}</td>

                        <td>
                            <a href="{% url 'update_patient' p.patient_id %}" class="btn edit">Edit</a>
                            <a href="{% url 'delete_patient' p.patient_id %}" class="btn delete">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="empty">
                            No patients found
                        </td>
                    </tr>
                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
