{% block content %}

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

/* CENTER */
.page-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

/* CARD */
.card-box{
    width:450px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    transition:0.3s;
}

.card-box:hover{
    transform:translateY(-5px);
}

/* TITLE */
.title{
    font-size:24px;
    font-weight:bold;
    color:#dc2626;
    margin-bottom:20px;
}

/* ICON */
.icon{
    font-size:40px;
    margin-bottom:10px;
}

/* TEXT */
.text{
    font-size:18px;
    margin-bottom:10px;
    color:#374151;
}

/* DEPT NAME */
.dept{
    font-size:22px;
    font-weight:bold;
    color:#111827;
    margin-bottom:20px;
}

/* BUTTONS */
.btn-danger{
    padding:10px 18px;
    background:#dc2626;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-right:10px;
    transition:0.3s;
}

.btn-danger:hover{
    background:#b91c1c;
}

.btn-cancel{
    padding:10px 18px;
    background:#6b7280;
    color:white;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}

.btn-cancel:hover{
    background:#4b5563;
}

</style>

<div class="page-wrapper">

    <div class="card-box">

        <div class="icon">⚠</div>

        <div class="title">Delete Confirmation</div>

        <div class="text">
            Are you sure you want to delete this department?
        </div>

        <div class="dept">
            🏢 {{ dept.name }}
        </div>

        <form method="POST">
            {% csrf_token %}

            <button type="submit" class="btn-danger">
                Yes, Delete
            </button>

            <a href="{% url 'department_list' %}" class="btn-cancel">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
