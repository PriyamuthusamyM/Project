<!DOCTYPE html>

{% load static %}


<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #e3f2fd, #f8f9fa);
      height: 100vh;
    }

    /* HEADER (optional) */
    .header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    /* FULL SCREEN CENTER */
    .wrapper {
      height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 250px);
      gap: 25px;
      justify-content: center;
    }

    .card {
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      width: 250px;
      border-radius: 15px;
      overflow: hidden;
      background: white;
      transition: 0.3s;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .title {
      color: grey;
      font-size: 20px;
      margin: 10px 0;
      text-align: center;
    }

    button {
      border: none;
      padding: 12px;
      color: white;
      background: #000;
      width: 100%;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    a {
      color: white;
      text-decoration: none;
      display: block;
    }

    /* MOBILE */
    @media (max-width: 1000px) {
      .grid-container {
        grid-template-columns: 1fr;
      }

      .card {
        width: 90%;
      }
    }

  </style>
</head>

<body>

  <div class="wrapper">

    <div class="grid-container">

      <div class="card">
        <img src="{% static 'images/admin.png' %}" alt="Admin">
        <p class="title">ADMIN</p>
        <button><a href="adminclick">View</a></button>
      </div>

      <div class="card">
        <img src="{% static 'images/doctor.png' %}" alt="Doctor">
        <p class="title">DOCTOR</p>
        <button><a href="doctorclick">View</a></button>
      </div>

      <div class="card">
        <img src="{% static 'images/patient.jpg' %}" alt="Patient">
        <p class="title">PATIENT</p>
        <button><a href="patientclick">View</a></button>
      </div>

      <div class="card">
        <img src="{% static 'images/staff.png' %}" alt="Staff">
        <p class="title">STAFF</p>
        <button><a href="staffclick">View</a></button>
      </div>


    </div>

  </div>


<div style="text-align:right;padding:10px;"><a href="{% url 'logout' %}">Logout</a></div>
</body>
</html>
